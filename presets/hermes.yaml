# Hermes Agent 预设模板
# 保护 Hermes 的核心配置文件

protected_files:
  - path: ~/.hermes_data/config.yaml
    label: "主配置"
    watch: on_change
  - path: ~/.hermes_data/.env
    label: "API密钥"
    watch: on_change
  - path: ~/.hermes_data/auth.json
    label: "OAuth凭证"
    watch: on_change
  - path: ~/.hermes_data/SOUL.md
    label: "人格文件"
    watch: on_change
  - path: ~/.hermes_data/channel_directory.json
    label: "平台路由"
    watch: on_change
  - path: ~/.hermes_data/gateway_state.json
    label: "网关状态"
    watch: manual
  - path: ~/.hermes_data/memories/MEMORY.md
    label: "记忆笔记"
    watch: daily
  - path: ~/.hermes_data/memories/USER.md
    label: "用户画像"
    watch: daily

snapshot_dir: ~/.agent-snapshots/
daily_time: "04:00"
retention:
  max_snapshots_per_file: 50
