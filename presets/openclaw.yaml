# OpenClaw Agent 预设模板
# 保护 OpenClaw 的核心配置文件

protected_files:
  - path: ~/.openclaw/config.yaml
    label: openclaw/config
    watch: on_change
  - path: ~/.openclaw/.env
    label: openclaw/.env
    watch: on_change
  - path: ~/.openclaw/auth.json
    label: openclaw/auth
    watch: on_change
  - path: ~/.openclaw/memories/MEMORY.md
    label: openclaw/memories/MEMORY
    watch: daily
  - path: ~/.openclaw/memories/USER.md
    label: openclaw/memories/USER
    watch: daily
  - path: ~/.openclaw/settings.json
    label: openclaw/settings
    watch: on_change

snapshot_dir: ~/.agent-snapshots/
daily_time: "04:00"
retention:
  max_snapshots_per_file: 50
