# Claude Code 预设模板
# 保护 Claude Code 的核心配置文件

protected_files:
  - path: ~/.claude/settings.json
    label: claude/settings
    watch: on_change
  - path: ~/.claude/.credentials.json
    label: claude/.credentials
    watch: on_change
  - path: ~/.claude/plugins/installed_plugins.json
    label: claude/plugins/installed_plugins
    watch: manual
  - path: ~/.claude/plugins/known_marketplaces.json
    label: claude/plugins/known_marketplaces
    watch: manual

snapshot_dir: ~/.agent-snapshots/
daily_time: "04:00"
retention:
  max_snapshots_per_file: 50
